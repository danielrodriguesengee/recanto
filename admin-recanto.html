<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Recanto do Strogonoff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        .json-area::-webkit-scrollbar-track { background: #1f2937; }
        .json-area::-webkit-scrollbar-thumb { background: #4b5563; }
        
        /* Toggle Switch Animation */
        .toggle-checkbox:checked { right: 0; border-color: #10B981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
        .toggle-checkbox { right: 0; z-index: 1; border-color: #e5e7eb; transition: all 0.3s; }
        .toggle-label { background-color: #e5e7eb; transition: all 0.3s; }
    </style>
</head>
<body class="text-gray-800 h-screen bg-gray-50 overflow-hidden">

    <!-- ========================================= -->
    <!-- TELA DE LOGIN                             -->
    <!-- ========================================= -->
    <div id="login-screen" class="flex h-full items-center justify-center bg-gray-900 p-4 relative z-[100]">
        <div class="bg-gray-800 border border-gray-700 p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-[#63121a] rounded-2xl mx-auto flex items-center justify-center text-white text-2xl shadow-lg mb-4">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Acesso Restrito</h2>
                <p class="text-gray-400 text-sm mt-1">Insira suas credenciais para gerenciar o cardápio</p>
            </div>
            <form onsubmit="realizarLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">E-mail</label>
                    <input type="email" id="email-login" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-[#63121a] focus:ring-1 focus:ring-[#63121a] transition-all" placeholder="admin@recanto.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Senha</label>
                    <input type="password" id="senha-login" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-[#63121a] focus:ring-1 focus:ring-[#63121a] transition-all" placeholder="••••••••">
                </div>
                <button type="submit" id="btn-login" class="w-full bg-[#63121a] hover:bg-red-900 text-white font-bold py-4 rounded-xl shadow-lg transition-colors mt-4 flex items-center justify-center gap-2 active:scale-95">
                    <i class="fas fa-sign-in-alt"></i> Entrar no Painel
                </button>
            </form>
            <div id="login-error" class="hidden mt-6 text-red-400 text-sm font-medium text-center bg-red-900/20 py-3 rounded-xl border border-red-900/50"></div>
        </div>
    </div>

    <!-- ========================================= -->
    <!-- CONTEÚDO DO APP (Oculto até Logar)        -->
    <!-- ========================================= -->
    <div id="app-content" class="hidden h-full flex-col w-full relative">
        
        <!-- HEADER / BARRA SUPERIOR -->
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shrink-0 gap-4 shadow-sm z-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#63121a] rounded-xl flex items-center justify-center text-white shadow-md">
                    <i class="fas fa-store"></i>
                </div>
                <div class="hidden sm:block">
                    <h1 class="font-bold text-lg text-gray-900 leading-tight">Painel Gerencial</h1>
                    <p class="text-xs text-gray-500 font-medium">Recanto do Strogonoff</p>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="carregarJSON()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 w-10 h-10 sm:w-auto sm:px-4 rounded-xl font-semibold transition flex items-center justify-center gap-2 border border-gray-200" title="Recarregar">
                    <i class="fas fa-sync-alt"></i> <span class="hidden sm:inline text-sm">Recarregar</span>
                </button>
                <button onclick="salvarJSON()" id="btn-salvar" class="bg-green-600 hover:bg-green-700 text-white px-4 sm:px-6 py-2.5 rounded-xl font-bold transition text-sm flex items-center justify-center gap-2 shadow-lg shadow-green-600/20 active:scale-95">
                    <i class="fas fa-save"></i> <span class="hidden sm:inline">Salvar Alterações</span>
                </button>
                <div class="w-px h-8 bg-gray-200 mx-1"></div>
                <button onclick="fazerLogout()" class="bg-red-50 hover:bg-red-100 text-red-600 w-10 h-10 rounded-xl flex items-center justify-center transition border border-red-100" title="Sair do Painel">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- ÁREA DE NOTIFICAÇÃO (TOAST FLUTUANTE) -->
        <div id="status-bar" class="fixed bottom-6 right-6 z-50 transform translate-x-[120%] opacity-0 transition-all duration-500 ease-in-out px-5 py-3 rounded-xl text-sm font-bold shadow-2xl pointer-events-none flex items-center gap-3"></div>

        <!-- NAVEGAÇÃO DE ABAS -->
        <div class="bg-white border-b border-gray-200 px-4 shrink-0 flex justify-center sm:justify-start z-10">
            <div class="flex space-x-8">
                <button onclick="switchTab('visual')" id="tab-btn-visual" class="tab-btn border-b-2 py-4 px-1 text-sm font-bold border-[#63121a] text-[#63121a] transition-colors flex items-center gap-2">
                    <i class="fas fa-toggle-on"></i> Painel Rápido
                </button>
                <button onclick="switchTab('json')" id="tab-btn-json" class="tab-btn border-b-2 py-4 px-1 text-sm font-bold border-transparent text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-2">
                    <i class="fas fa-code"></i> Editor Avançado
                </button>
            </div>
        </div>

        <!-- ÁREA DE CONTEÚDO PRINCIPAL -->
        <main class="flex-1 overflow-hidden relative">
            
            <!-- ABA 1: PAINEL VISUAL -->
            <div id="view-visual" class="h-full overflow-y-auto p-4 md:p-6 pb-20">
                <div class="max-w-5xl mx-auto space-y-8" id="visual-content">
                    <div class="text-center py-20 text-gray-400">
                        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                        <p>Carregando painel...</p>
                    </div>
                </div>
            </div>

            <!-- ABA 2: EDITOR JSON -->
            <div id="view-json" class="h-full hidden flex-col p-4 bg-gray-900">
                <div class="flex justify-between items-center mb-2 px-1">
                    <p class="text-xs text-gray-400 font-medium"><i class="fas fa-info-circle"></i> Edite preços, adicione itens ou altere imagens aqui.</p>
                    <span id="char-count" class="text-xs text-gray-500 font-mono bg-gray-800 px-2 py-1 rounded">0 chars</span>
                </div>
                <textarea id="json-editor" spellcheck="false" class="json-area w-full flex-1 bg-[#1e1e1e] border border-gray-700 rounded-xl p-4 text-[#4fc1ff] font-mono text-sm sm:text-base focus:outline-none focus:border-blue-500 shadow-inner resize-none leading-relaxed"></textarea>
            </div>

        </main>
    </div>

    <script>
        // CONFIGURAÇÕES DO SUPABASE
        const SUPABASE_URL = "https://vyurqamjuzsichkoapdw.supabase.co/rest/v1/config?id=eq.1";
        const AUTH_URL = "https://vyurqamjuzsichkoapdw.supabase.co/auth/v1/token?grant_type=password";
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5dXJxYW1qdXpzaWNoa29hcGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MzEyODgsImV4cCI6MjA5OTIwNzI4OH0._bStNhH33lQzgz25LGQENpskHc-W0aIgYfh25vqdiBM";
        
        let currentData = null; 
        const editor = document.getElementById('json-editor');
        const statusBar = document.getElementById('status-bar');
        const btnSalvar = document.getElementById('btn-salvar');

        // ---------------------------------------------------------
        // SISTEMA DE AUTENTICAÇÃO E SESSÃO
        // ---------------------------------------------------------
        window.addEventListener('DOMContentLoaded', () => {
            const token = sessionStorage.getItem('access_token');
            if (token) {
                mostrarApp();
                carregarJSON();
            }
        });

        async function realizarLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email-login').value;
            const password = document.getElementById('senha-login').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
            errorDiv.classList.add('hidden');

            try {
                const response = await fetch(AUTH_URL, {
                    method: 'POST',
                    headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) throw new Error("E-mail ou senha incorretos.");

                sessionStorage.setItem('access_token', data.access_token);
                mostrarApp();
                carregarJSON();

            } catch(err) {
                errorDiv.innerText = err.message;
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar no Painel';
            }
        }

        function fazerLogout() {
            sessionStorage.removeItem('access_token');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('app-content').classList.remove('flex');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('login-screen').classList.add('flex');
            document.getElementById('senha-login').value = '';
        }

        function mostrarApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('flex');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('app-content').classList.add('flex');
        }

        // ---------------------------------------------------------
        // UTILITÁRIOS E TOAST
        // ---------------------------------------------------------
        editor.addEventListener('input', () => {
            document.getElementById('char-count').innerText = `${editor.value.length} chars`;
        });

        let toastTimeout;
        function mostrarStatus(mensagem, tipo) {
            statusBar.innerHTML = mensagem;
            const baseClasses = "fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-50 transition-all duration-500 ease-in-out px-5 py-3 rounded-xl text-sm font-bold shadow-2xl pointer-events-none flex items-center gap-3";
            const colorClasses = tipo === 'erro' ? 'bg-red-600 text-white' : 'bg-gray-800 text-green-400 border border-gray-700';
            
            statusBar.className = `${baseClasses} ${colorClasses} translate-x-0 opacity-100`;

            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { 
                statusBar.classList.remove('translate-x-0', 'opacity-100');
                statusBar.classList.add('translate-x-[120%]', 'opacity-0');
            }, 3000);
        }

        // ---------------------------------------------------------
        // CONTROLE DE ABAS E SINCRONIZAÇÃO
        // ---------------------------------------------------------
        function switchTab(tabId) {
            const btnVisual = document.getElementById('tab-btn-visual');
            const btnJson = document.getElementById('tab-btn-json');
            
            [btnVisual, btnJson].forEach(btn => {
                btn.classList.remove('border-[#63121a]', 'text-[#63121a]');
                btn.classList.add('border-transparent', 'text-gray-500');
            });

            document.getElementById('view-visual').classList.add('hidden');
            document.getElementById('view-json').classList.add('hidden');

            if (tabId === 'visual') {
                btnVisual.classList.add('border-[#63121a]', 'text-[#63121a]');
                btnVisual.classList.remove('border-transparent', 'text-gray-500');
                
                try {
                    currentData = JSON.parse(editor.value);
                    renderizarPainelVisual();
                    document.getElementById('view-visual').classList.remove('hidden');
                } catch (e) {
                    alert("Atenção: O código no Editor Avançado contém erros de formatação. Corrija antes de voltar ao painel visual.");
                    switchTab('json'); 
                }
            } else {
                btnJson.classList.add('border-[#63121a]', 'text-[#63121a]');
                btnJson.classList.remove('border-transparent', 'text-gray-500');
                editor.value = JSON.stringify(currentData, null, 4);
                document.getElementById('view-json').classList.remove('hidden');
                document.getElementById('view-json').classList.add('flex');
                editor.dispatchEvent(new Event('input'));
            }
        }

        // ---------------------------------------------------------
        // CONSTRUTOR DO PAINEL VISUAL
        // ---------------------------------------------------------
        function criarToggleCard(label, isChecked, cat, idx, icone, subtitulo = "", imagem = "") {
            const mediaHtml = imagem 
                ? `<img src="${imagem}" alt="" loading="lazy" class="w-12 h-12 rounded-full object-cover shadow-sm border border-gray-100 shrink-0">`
                : `<div class="w-12 h-12 rounded-full bg-gray-50 border border-gray-100 flex items-center justify-center text-gray-400 shrink-0"><i class="fas ${icone}"></i></div>`;

            return `
            <div class="flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition duration-200 gap-3">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    ${mediaHtml}
                    <div class="flex flex-col min-w-0">
                        <span class="font-bold text-gray-800 text-sm leading-tight break-words">${label}</span>
                        ${subtitulo ? `<span class="text-[11px] text-gray-500 font-semibold mt-0.5">${subtitulo}</span>` : ''}
                    </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer shrink-0">
                    <input type="checkbox" class="sr-only peer toggle-action" ${isChecked ? 'checked' : ''} data-cat="${cat}" data-idx="${idx}">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500 shadow-inner"></div>
                </label>
            </div>`;
        }

        function renderizarPainelVisual() {
            const container = document.getElementById('visual-content');
            if (!currentData) return;

            let html = '';

            // STATUS GERAL DA LOJA
            html += `
                <div class="mb-8">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i class="fas fa-door-open"></i> Funcionamento</h2>
                    <div class="p-1 bg-white rounded-3xl shadow-sm border border-gray-200">
                        <div id="loja-card" class="flex items-center justify-between p-4 md:p-6 rounded-t-2xl rounded-b-lg ${currentData.configuracoes.loja_aberta ? 'bg-green-50' : 'bg-red-50'} transition-colors duration-300">
                            <div class="flex items-center gap-4">
                                <div id="loja-icon-wrapper" class="w-12 h-12 rounded-full flex items-center justify-center text-xl text-white shadow-md ${currentData.configuracoes.loja_aberta ? 'bg-green-500' : 'bg-red-500'} transition-colors duration-300">
                                    <i id="loja-icon" class="fas ${currentData.configuracoes.loja_aberta ? 'fa-store' : 'fa-store-slash'}"></i>
                                </div>
                                <div class="flex flex-col">
                                    <span id="loja-title" class="font-bold text-lg ${currentData.configuracoes.loja_aberta ? 'text-green-800' : 'text-red-800'}">Loja ${currentData.configuracoes.loja_aberta ? 'Aberta' : 'Fechada'}</span>
                                    <span id="loja-desc" class="text-xs ${currentData.configuracoes.loja_aberta ? 'text-green-600' : 'text-red-600'} opacity-80">${currentData.configuracoes.loja_aberta ? 'Recebendo pedidos normalmente' : 'Clientes não podem finalizar pedido'}</span>
                                </div>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer shrink-0 scale-125 origin-right">
                                <input type="checkbox" class="sr-only peer toggle-action" ${currentData.configuracoes.loja_aberta ? 'checked' : ''} data-cat="loja">
                                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                            </label>
                        </div>
                        <hr class="border-gray-100 mx-4">
                        <div class="flex items-center justify-between p-4 md:p-6 bg-white rounded-b-2xl rounded-t-lg gap-4">
                            <div class="flex flex-col">
                                <span class="font-bold text-gray-800 text-sm">Tempo de Entrega</span>
                                <span class="text-xs text-gray-500 font-medium">Salva ao sair do campo</span>
                            </div>
                            <div class="relative shrink-0">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                    <i class="far fa-clock text-gray-400"></i>
                                </div>
                                <input type="text" id="tempo-entrega-input" value="${currentData.configuracoes.tempo_entrega || ''}" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-green-500 focus:border-green-500 block w-32 pl-9 p-2.5 font-bold shadow-inner transition-colors" placeholder="Ex: 45 min">
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // PRODUTOS
            const categorias = [
                { id: 'combos', label: 'Combos Especiais', icone: 'fa-star text-yellow-500' },
                { id: 'pratos', label: 'Pratos Principais', icone: 'fa-utensils text-orange-500' },
                { id: 'adicionais', label: 'Adicionais Extras', icone: 'fa-plus text-blue-500' },
                { id: 'bebidas', label: 'Bebidas', icone: 'fa-glass-water text-cyan-500' }
            ];

            categorias.forEach(cat => {
                if (currentData[cat.id] && currentData[cat.id].length > 0) {
                    html += `
                        <div class="mb-8">
                            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i class="fas ${cat.icone} opacity-80"></i> ${cat.label}</h2>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    `;
                    currentData[cat.id].forEach((item, index) => {
                        const nome = item.nome || item.titulo || item.display || 'Item sem nome';
                        const preco = item.preco_por ? item.preco_por : (item.preco || 0);
                        const precoFormatado = `R$ ${preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                        const imagem = (item.imagens && item.imagens.length > 0) ? item.imagens[0] : (item.imagem || '');
                        html += criarToggleCard(nome, item.disponivel, cat.id, index, cat.icone.split(' ')[0], precoFormatado, imagem);
                    });
                    html += `</div></div>`;
                }
            });

            container.innerHTML = html;
        }

        // ---------------------------------------------------------
        // ESCUTADORES E COMUNICAÇÃO COM O BANCO
        // ---------------------------------------------------------
        document.getElementById('visual-content').addEventListener('change', (e) => {
            let hasChanges = false;

            if (e.target.matches('.toggle-action')) {
                const cat = e.target.getAttribute('data-cat');
                const isChecked = e.target.checked;

                if (cat === 'loja') {
                    currentData.configuracoes.loja_aberta = isChecked;
                    const lojaCard = document.getElementById('loja-card');
                    const lojaIconWrapper = document.getElementById('loja-icon-wrapper');
                    const lojaIcon = document.getElementById('loja-icon');
                    const lojaTitle = document.getElementById('loja-title');
                    const lojaDesc = document.getElementById('loja-desc');

                    if (isChecked) {
                        lojaCard.classList.replace('bg-red-50', 'bg-green-50');
                        lojaIconWrapper.classList.replace('bg-red-500', 'bg-green-500');
                        lojaIcon.classList.replace('fa-store-slash', 'fa-store');
                        lojaTitle.classList.replace('text-red-800', 'text-green-800');
                        lojaTitle.innerText = "Loja Aberta";
                        lojaDesc.classList.replace('text-red-600', 'text-green-600');
                        lojaDesc.innerText = "Recebendo pedidos normalmente";
                    } else {
                        lojaCard.classList.replace('bg-green-50', 'bg-red-50');
                        lojaIconWrapper.classList.replace('bg-green-500', 'bg-red-500');
                        lojaIcon.classList.replace('fa-store', 'fa-store-slash');
                        lojaTitle.classList.replace('text-green-800', 'text-red-800');
                        lojaTitle.innerText = "Loja Fechada";
                        lojaDesc.classList.replace('text-green-600', 'text-red-600');
                        lojaDesc.innerText = "Clientes não podem finalizar pedido";
                    }
                } else {
                    const idx = e.target.getAttribute('data-idx');
                    currentData[cat][idx].disponivel = isChecked;
                }
                hasChanges = true;
            }

            if (e.target.id === 'tempo-entrega-input') {
                currentData.configuracoes.tempo_entrega = e.target.value;
                hasChanges = true;
            }

            if (hasChanges) {
                editor.value = JSON.stringify(currentData, null, 4);
                editor.dispatchEvent(new Event('input'));
                salvarJSON(); // Auto-save
            }
        });

        async function carregarJSON() {
            try {
                // Para SELECT (leitura pública), podemos usar a API_KEY anônima normal.
                const response = await fetch(`${SUPABASE_URL}&select=dados`, {
                    headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` }
                });
                
                if (!response.ok) throw new Error("Falha de comunicação com o banco.");
                
                const resultado = await response.json();
                currentData = resultado[0].dados;
                
                editor.value = JSON.stringify(currentData, null, 4);
                editor.dispatchEvent(new Event('input'));
                renderizarPainelVisual();
                
            } catch (erro) {
                mostrarStatus(`❌ Erro ao carregar: ${erro.message}`, "erro");
            }
        }

        async function salvarJSON() {
            try {
                const token = sessionStorage.getItem('access_token');
                if (!token) throw new Error("Sessão expirada.");

                btnSalvar.disabled = true;
                btnSalvar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

                let jsonParaSalvar;
                try {
                    jsonParaSalvar = JSON.parse(editor.value);
                    currentData = jsonParaSalvar;
                } catch (e) {
                    throw new Error("O código JSON possui erros de formatação na aba Editor Avançado.");
                }

                const payload = { dados: jsonParaSalvar };
                
                const response = await fetch(SUPABASE_URL, {
                    method: 'PATCH',
                    headers: {
                        'apikey': API_KEY, // A apikey avisa ao Supabase de onde vem a requisição
                        'Authorization': `Bearer ${token}`, // O Token autenticado permite o UPDATE na política
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 401 || response.status === 403) {
                    fazerLogout();
                    throw new Error("Sessão expirada. Faça login novamente.");
                }

                if (!response.ok) throw new Error("O banco bloqueou a gravação. Verifique as regras (RLS).");

                if (!document.getElementById('view-json').classList.contains('hidden')) {
                    renderizarPainelVisual(); 
                }

                mostrarStatus('<i class="fas fa-check-circle"></i> Cardápio salvo e publicado!', "sucesso");
            } catch (erro) {
                mostrarStatus(`❌ Erro: ${erro.message}`, "erro");
            } finally {
                btnSalvar.disabled = false;
                btnSalvar.innerHTML = '<i class="fas fa-save"></i> <span class="hidden sm:inline">Salvar Alterações</span>';
            }
        }
    </script>
</body>
</html>
