<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Painel - Recanto do Strogonoff</title>
    
    <meta name="theme-color" content="#fdfbf7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Admin Recanto">
    <link rel="apple-touch-icon" href="image/logo1.ico">
    <link rel="icon" href="image/logo1.ico">
    <link rel="manifest" href='data:application/manifest+json,%7B%22name%22%3A%22Painel%20Admin%20-%20Recanto%22%2C%22short_name%22%3A%22Admin%20Recanto%22%2C%22start_url%22%3A%22.%2Fadmin-recanto.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23fdfbf7%22%2C%22theme_color%22%3A%22%2363121a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22image%2Flogo1.ico%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fx-icon%22%7D%5D%7D'>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toggle-checkbox:checked { right: 0; border-color: #22c55e; }
        .toggle-checkbox:checked + .toggle-label { background-color: #22c55e; }
        .toggle-checkbox { right: 0; z-index: 1; border-color: #e5e7eb; transition: all 0.3s; }
        .toggle-label { background-color: #e5e7eb; transition: all 0.3s; }
        
        input[type="text"], input[type="email"], input[type="password"], textarea {
            font-size: 16px !important;
        }
        
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-[100dvh] flex flex-col font-sans selection:bg-red-200">

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-gray-900 p-4 z-[100] overflow-y-auto">
        <div class="bg-gray-800 border border-gray-700 p-6 md:p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <img src="image/logo.webp" alt="Logo" class="h-24 w-auto mx-auto mb-4 drop-shadow-lg object-contain" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';">
                <div id="logo-fallback" class="w-16 h-16 bg-[#63121a] rounded-2xl mx-auto hidden items-center justify-center text-white text-3xl shadow-lg mb-4">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Acesso Restrito</h2>
                <p class="text-gray-400 text-sm mt-1">Insira suas credenciais para gerenciar</p>
            </div>
            <form onsubmit="realizarLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">E-mail</label>
                    <input type="email" id="email-login" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-[#63121a] focus:ring-1 focus:ring-[#63121a] transition-all" placeholder="admin@recanto.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Senha</label>
                    <input type="password" id="senha-login" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-[#63121a] focus:ring-1 focus:ring-[#63121a] transition-all" placeholder="••••••••">
                </div>
                <button type="submit" id="btn-login" class="w-full bg-[#63121a] hover:bg-red-900 text-white font-bold py-4 rounded-xl shadow-lg transition-colors mt-4 flex items-center justify-center gap-2 active:scale-95">
                    <i class="fas fa-sign-in-alt"></i> Entrar no Painel
                </button>
            </form>
            <div id="login-error" class="hidden mt-6 text-red-400 text-sm font-medium text-center bg-red-900/20 py-3 rounded-xl border border-red-900/50"></div>
        </div>
    </div>

    <div id="app-content" class="hidden flex-1 flex-col w-full min-h-[100dvh] relative">
        
        <header class="bg-[#fdfbf7] border-b border-[#e5e0d8] px-4 py-3 shadow-sm z-50 sticky top-0 w-full flex justify-between items-center h-[72px]">
            <div class="flex items-center gap-3 min-w-0 h-full">
                <img src="image/logo.webp" alt="Logo" class="h-12 w-auto object-contain drop-shadow-md" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                <div class="w-10 h-10 bg-[#63121a] rounded-lg hidden items-center justify-center shadow-md shrink-0">
                    <i class="fas fa-store text-white"></i>
                </div>
                <div class="flex flex-col min-w-0">
                    <h1 class="font-bold text-base sm:text-lg text-[#1a1a1a] leading-tight truncate">Painel Admin</h1>
                    <p class="text-[10px] sm:text-xs text-[#4a4a4a] font-medium truncate tracking-widest uppercase">Premium Delivery</p>
                </div>
            </div>
            <div class="flex gap-2 items-center shrink-0">
                <button onclick="carregarJSON()" class="bg-white hover:bg-gray-50 text-gray-700 w-10 h-10 sm:w-auto sm:px-4 rounded-xl font-semibold transition flex items-center justify-center gap-2 border border-gray-200 shadow-sm" title="Recarregar do Banco">
                    <i class="fas fa-sync-alt"></i> <span class="hidden sm:inline text-sm">Recarregar</span>
                </button>
                <div class="w-px h-6 bg-gray-200 mx-1"></div>
                <button onclick="fazerLogout()" class="bg-red-50 hover:bg-red-100 text-red-600 w-10 h-10 rounded-xl flex items-center justify-center transition border border-red-100 shadow-sm" title="Sair do Painel">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <div id="status-bar" class="fixed bottom-6 right-6 z-[100] transform translate-x-[150%] opacity-0 transition-all duration-300 ease-in-out px-5 py-3 rounded-xl text-sm font-bold shadow-2xl pointer-events-none flex items-center gap-3"></div>

        <div class="bg-white border-b border-gray-200 px-4 shrink-0 flex justify-center sm:justify-start z-40 sticky top-[72px] w-full h-[52px]">
            <div class="flex space-x-6 sm:space-x-8 h-full">
                <button onclick="switchTab('visual')" id="tab-btn-visual" class="tab-btn border-b-2 h-full px-2 text-sm font-bold border-[#63121a] text-[#63121a] transition-colors flex items-center gap-2 whitespace-nowrap">
                    <i class="fas fa-toggle-on"></i> Painel Rápido
                </button>
                <button onclick="switchTab('json')" id="tab-btn-json" class="tab-btn border-b-2 h-full px-2 text-sm font-bold border-transparent text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-2 whitespace-nowrap">
                    <i class="fas fa-code"></i> Editor JSON
                </button>
            </div>
        </div>

        <main class="flex-1 w-full max-w-5xl mx-auto p-4 sm:p-6 pb-20">
            
            <div id="view-visual" class="block">
                <div class="space-y-8" id="visual-content">
                    <div class="text-center py-20 text-gray-400">
                        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                        <p>Carregando painel...</p>
                    </div>
                </div>
            </div>

            <div id="view-json" class="hidden flex-col h-[calc(100dvh-200px)] min-h-[500px]">
                <div class="flex justify-between items-center mb-3">
                    <label for="json-editor" class="text-xs text-gray-500 uppercase tracking-widest font-bold">
                        Código Fonte (JSON)
                    </label>
                    <span id="char-count" class="text-xs text-gray-500 font-bold bg-gray-200 px-2 py-1 rounded-md">0 caracteres</span>
                </div>
                <textarea id="json-editor" spellcheck="false" class="w-full flex-1 bg-gray-900 border border-gray-700 rounded-xl p-4 text-green-400 font-mono text-sm focus:outline-none focus:border-[#63121a] focus:ring-2 focus:ring-[#63121a]/50 resize-none shadow-inner"></textarea>
                <button onclick="salvarJSONManual()" id="btn-salvar-manual" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-colors mt-4 flex items-center justify-center gap-2 active:scale-95">
                    <i class="fas fa-save"></i> Salvar JSON Manualmente
                </button>
            </div>
            
        </main>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => { self.skipWaiting(); });
                self.addEventListener('activate', (e) => { e.waitUntil(self.clients.claim()); });
                self.addEventListener('fetch', (e) => {});
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            navigator.serviceWorker.register(url).catch(err => console.log('SW registration failed:', err));
        }

        const SUPABASE_URL = "https://vyurqamjuzsichkoapdw.supabase.co";
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5dXJxYW1qdXpzaWNoa29hcGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MzEyODgsImV4cCI6MjA5OTIwNzI4OH0._bStNhH33lQzgz25LGQENpskHc-W0aIgYfh25vqdiBM";
        
        let currentData = null;
        let saveTimeout = null;

        const editor = document.getElementById('json-editor');
        const statusBar = document.getElementById('status-bar');

        function verificarSessao() {
            const token = localStorage.getItem('supabaseToken');
            if (token) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('app-content').classList.add('flex');
                carregarJSON();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('app-content').classList.remove('flex');
            }
        }

        async function realizarLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email-login').value;
            const senha = document.getElementById('senha-login').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
                errorDiv.classList.add('hidden');

                const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: {
                        'apikey': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: senha })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error_description || "E-mail ou senha incorretos.");
                }

                localStorage.setItem('supabaseToken', data.access_token);
                verificarSessao();

            } catch (erro) {
                errorDiv.innerText = erro.message;
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar no Painel';
            }
        }

        function fazerLogout() {
            localStorage.removeItem('supabaseToken');
            window.location.reload();
        }

        function mostrarToast(mensagem, tipo = 'sucesso') {
            statusBar.innerHTML = tipo === 'erro' 
                ? `<i class="fas fa-exclamation-circle text-lg"></i> <span>${mensagem}</span>` 
                : `<i class="fas fa-check-circle text-lg"></i> <span>${mensagem}</span>`;
            
            statusBar.className = `fixed bottom-6 right-6 z-[100] transition-all duration-300 ease-in-out px-5 py-3 rounded-xl text-sm font-bold shadow-2xl pointer-events-none flex items-center gap-3 transform translate-x-0 opacity-100 ${tipo === 'erro' ? 'bg-red-600 text-white border border-red-500' : 'bg-gray-900 text-green-400 border border-gray-700'}`;
            
            setTimeout(() => { 
                statusBar.classList.remove('translate-x-0', 'opacity-100');
                statusBar.classList.add('translate-x-[150%]', 'opacity-0');
            }, 3000);
        }

        function switchTab(tab) {
            document.getElementById('view-visual').style.display = tab === 'visual' ? 'block' : 'none';
            document.getElementById('view-json').style.display = tab === 'json' ? 'flex' : 'none';
            
            document.getElementById('tab-btn-visual').className = `tab-btn border-b-2 h-full px-2 text-sm font-bold transition-colors flex items-center gap-2 whitespace-nowrap ${tab === 'visual' ? 'border-[#63121a] text-[#63121a]' : 'border-transparent text-gray-500 hover:text-gray-700'}`;
            document.getElementById('tab-btn-json').className = `tab-btn border-b-2 h-full px-2 text-sm font-bold transition-colors flex items-center gap-2 whitespace-nowrap ${tab === 'json' ? 'border-[#63121a] text-[#63121a]' : 'border-transparent text-gray-500 hover:text-gray-700'}`;

            if (tab === 'json' && currentData) {
                editor.value = JSON.stringify(currentData, null, 4);
                editor.dispatchEvent(new Event('input'));
            }
            if (tab === 'visual' && currentData) {
                renderizarPainelVisual();
            }
        }

        editor.addEventListener('input', () => {
            document.getElementById('char-count').innerText = `${editor.value.length} caracteres`;
        });

        async function carregarJSON() {
            const token = localStorage.getItem('supabaseToken');
            try {
                document.getElementById('visual-content').innerHTML = '<div class="text-center py-20 text-gray-400"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Carregando painel...</p></div>';
                
                const response = await fetch(`${SUPABASE_URL}/rest/v1/config?id=eq.1&select=dados`, {
                    headers: { 
                        'apikey': API_KEY, 
                        'Authorization': `Bearer ${token}` 
                    }
                });
                
                if (response.status === 401) throw new Error("Sessão expirada");
                if (!response.ok) throw new Error("Falha ao buscar dados.");
                
                const resultado = await response.json();
                currentData = resultado[0].dados;
                
                editor.value = JSON.stringify(currentData, null, 4);
                editor.dispatchEvent(new Event('input'));
                
                renderizarPainelVisual();
                mostrarToast("Dados sincronizados com sucesso!");
            } catch (erro) {
                if (erro.message === "Sessão expirada") fazerLogout();
                document.getElementById('visual-content').innerHTML = `<div class="text-center py-20 text-red-500"><i class="fas fa-exclamation-triangle text-3xl mb-3"></i><p>Erro ao carregar dados: ${erro.message}</p></div>`;
            }
        }

        async function salvarDadosBanco(dadosParaSalvar, mensagemSucesso) {
            const token = localStorage.getItem('supabaseToken');
            try {
                const payload = { dados: dadosParaSalvar };
                
                const response = await fetch(`${SUPABASE_URL}/rest/v1/config?id=eq.1`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 401) throw new Error("Sessão expirada");
                if (!response.ok) throw new Error("Acesso negado ou erro no servidor.");

                mostrarToast(mensagemSucesso);
            } catch (erro) {
                if (erro.message === "Sessão expirada") fazerLogout();
                mostrarToast(`Erro ao salvar: ${erro.message}`, "erro");
                carregarJSON(); 
            }
        }

        async function salvarJSONManual() {
            const btn = document.getElementById('btn-salvar-manual');
            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

                let jsonValidado;
                try {
                    jsonValidado = JSON.parse(editor.value);
                } catch (e) {
                    throw new Error("JSON inválido! Verifique a sintaxe.");
                }

                currentData = jsonValidado; 
                await salvarDadosBanco(jsonValidado, "Código JSON salvo com sucesso!");
            } catch (erro) {
                mostrarToast(erro.message, "erro");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Salvar JSON Manualmente';
            }
        }

        function criarToggleCard(label, isChecked, cat, idx, icone, subtitulo = "", imagem = "") {
            const mediaHtml = imagem 
                ? `<img src="${imagem}" alt="" loading="lazy" class="w-12 h-12 rounded-xl object-cover shadow-sm border border-gray-200 shrink-0 bg-white">`
                : `<div class="w-12 h-12 rounded-xl bg-gray-100 border border-gray-200 flex items-center justify-center text-gray-400 shrink-0"><i class="fas ${icone} text-lg"></i></div>`;

            return `
            <div class="flex items-center justify-between p-4 bg-white border border-gray-200 rounded-2xl shadow-sm hover:border-gray-300 transition duration-200 gap-3">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    ${mediaHtml}
                    <div class="flex flex-col min-w-0">
                        <span class="font-bold text-gray-800 text-sm leading-tight break-words whitespace-normal">${label}</span>
                        ${subtitulo ? `<span class="text-[11px] text-gray-500 font-semibold mt-0.5 break-words whitespace-normal line-clamp-2">${subtitulo}</span>` : ''}
                    </div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer shrink-0">
                    <input type="checkbox" class="sr-only peer toggle-action" ${isChecked ? 'checked' : ''} data-cat="${cat}" data-idx="${idx}">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500 shadow-inner"></div>
                </label>
            </div>`;
        }

        function renderizarPainelVisual() {
            const container = document.getElementById('visual-content');
            if (!currentData) return;

            let html = '';

            html += `
                <div>
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2 pl-1"><i class="fas fa-door-open"></i> Loja & Entrega</h2>
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
                        
                        <div id="loja-card" class="flex items-center justify-between p-5 border-b border-gray-100 ${currentData.configuracoes.loja_aberta ? 'bg-green-50/50' : 'bg-red-50/50'} transition-colors duration-300 gap-3">
                            <div class="flex items-center gap-4 min-w-0">
                                <div id="loja-icon-wrapper" class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl text-white shadow-md shrink-0 ${currentData.configuracoes.loja_aberta ? 'bg-green-500' : 'bg-red-500'} transition-colors duration-300">
                                    <i id="loja-icon" class="fas ${currentData.configuracoes.loja_aberta ? 'fa-store' : 'fa-store-slash'}"></i>
                                </div>
                                <div class="flex flex-col min-w-0">
                                    <span id="loja-title" class="font-bold text-lg truncate ${currentData.configuracoes.loja_aberta ? 'text-green-800' : 'text-red-800'}">Loja ${currentData.configuracoes.loja_aberta ? 'Aberta' : 'Fechada'}</span>
                                    <span id="loja-desc" class="text-xs leading-tight ${currentData.configuracoes.loja_aberta ? 'text-green-600' : 'text-red-600'} opacity-80">${currentData.configuracoes.loja_aberta ? 'Clientes podem fazer pedidos' : 'Pedidos bloqueados'}</span>
                                </div>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer shrink-0 scale-110 md:scale-125 origin-right">
                                <input type="checkbox" class="sr-only peer toggle-action" ${currentData.configuracoes.loja_aberta ? 'checked' : ''} data-cat="loja">
                                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500 shadow-inner"></div>
                            </label>
                        </div>

                        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 gap-4">
                            <div class="flex flex-col">
                                <span class="font-bold text-gray-800 text-sm">Tempo de Entrega</span>
                                <span class="text-xs text-gray-500">Salva ao sair do campo</span>
                            </div>
                            <div class="relative w-full sm:w-48 shrink-0">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                    <i class="far fa-clock text-gray-400"></i>
                                </div>
                                <input type="text" id="tempo-entrega-input" value="${currentData.configuracoes.tempo_entrega || ''}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-[#63121a] focus:border-[#63121a] block w-full pl-10 p-3 font-bold shadow-inner transition-colors" placeholder="Ex: 45 min">
                            </div>
                        </div>
                    </div>
                </div>
            `;

            if (currentData.combos && currentData.combos.length > 0) {
                html += `<div><h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2 pl-1"><i class="fas fa-star text-yellow-500"></i> Destaques / Combos</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                currentData.combos.forEach((item, idx) => {
                    const img = (item.imagens && item.imagens.length > 0) ? item.imagens[0] : item.imagem;
                    html += criarToggleCard(item.nome || item.titulo, item.disponivel, 'combos', idx, 'fa-star', `R$ ${item.preco_por.toFixed(2).replace('.',',')}`, img);
                });
                html += `</div></div>`;
            }

            if (currentData.pratos && currentData.pratos.length > 0) {
                html += `<div><h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2 pl-1"><i class="fas fa-concierge-bell text-red-800"></i> Pratos</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                currentData.pratos.forEach((item, idx) => {
                    const img = (item.imagens && item.imagens.length > 0) ? item.imagens[0] : item.imagem;
                    html += criarToggleCard(item.nome, item.disponivel, 'pratos', idx, 'fa-utensils', `R$ ${item.preco.toFixed(2).replace('.',',')}`, img);
                });
                html += `</div></div>`;
            }

            if (currentData.adicionais && currentData.adicionais.length > 0) {
                html += `<div><h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2 pl-1"><i class="fas fa-plus-circle text-orange-500"></i> Adicionais</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                currentData.adicionais.forEach((item, idx) => {
                    const img = (item.imagens && item.imagens.length > 0) ? item.imagens[0] : item.imagem;
                    html += criarToggleCard(item.display, item.disponivel, 'adicionais', idx, 'fa-bacon', `R$ ${item.preco.toFixed(2).replace('.',',')}`, img);
                });
                html += `</div></div>`;
            }

            if (currentData.bebidas && currentData.bebidas.length > 0) {
                html += `<div><h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2 pl-1"><i class="fas fa-glass-cheers text-blue-500"></i> Bebidas</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                currentData.bebidas.forEach((item, idx) => {
                    const img = (item.imagens && item.imagens.length > 0) ? item.imagens[0] : item.imagem;
                    html += criarToggleCard(item.nome, item.disponivel, 'bebidas', idx, 'fa-bottle-water', `R$ ${item.preco.toFixed(2).replace('.',',')}`, img);
                });
                html += `</div></div>`;
            }

            container.innerHTML = html;

            document.querySelectorAll('.toggle-action').forEach(toggle => {
                toggle.addEventListener('change', (e) => {
                    const cat = e.target.getAttribute('data-cat');
                    const idx = e.target.getAttribute('data-idx');
                    const isChecked = e.target.checked;

                    if (cat === 'loja') {
                        currentData.configuracoes.loja_aberta = isChecked;
                        
                        const card = document.getElementById('loja-card');
                        const iconWrapper = document.getElementById('loja-icon-wrapper');
                        const icon = document.getElementById('loja-icon');
                        const title = document.getElementById('loja-title');
                        const desc = document.getElementById('loja-desc');

                        if (isChecked) {
                            card.className = "flex items-center justify-between p-5 border-b border-gray-100 bg-green-50/50 transition-colors duration-300 gap-3";
                            iconWrapper.className = "w-12 h-12 rounded-2xl flex items-center justify-center text-xl text-white shadow-md shrink-0 bg-green-500 transition-colors duration-300";
                            icon.className = "fas fa-store";
                            title.className = "font-bold text-lg truncate text-green-800";
                            title.innerText = "Loja Aberta";
                            desc.className = "text-xs leading-tight text-green-600 opacity-80";
                            desc.innerText = "Clientes podem fazer pedidos";
                        } else {
                            card.className = "flex items-center justify-between p-5 border-b border-gray-100 bg-red-50/50 transition-colors duration-300 gap-3";
                            iconWrapper.className = "w-12 h-12 rounded-2xl flex items-center justify-center text-xl text-white shadow-md shrink-0 bg-red-500 transition-colors duration-300";
                            icon.className = "fas fa-store-slash";
                            title.className = "font-bold text-lg truncate text-red-800";
                            title.innerText = "Loja Fechada";
                            desc.className = "text-xs leading-tight text-red-600 opacity-80";
                            desc.innerText = "Pedidos bloqueados";
                        }
                    } else {
                        currentData[cat][idx].disponivel = isChecked;
                    }

                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                        salvarDadosBanco(currentData, "Alteração salva no banco!");
                        editor.value = JSON.stringify(currentData, null, 4);
                        editor.dispatchEvent(new Event('input'));
                    }, 500); 
                });
            });

            const tempoInput = document.getElementById('tempo-entrega-input');
            if(tempoInput){
                tempoInput.addEventListener('blur', (e) => {
                    const novoTempo = e.target.value;
                    if(currentData.configuracoes.tempo_entrega !== novoTempo) {
                        currentData.configuracoes.tempo_entrega = novoTempo;
                        salvarDadosBanco(currentData, "Tempo de entrega atualizado!");
                        editor.value = JSON.stringify(currentData, null, 4);
                        editor.dispatchEvent(new Event('input'));
                    }
                });
            }
        }

        window.addEventListener('DOMContentLoaded', verificarSessao);
    </script>
</body>
</html>
